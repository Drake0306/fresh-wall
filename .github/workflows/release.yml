# Builds a release APK on every `v*` tag push and attaches it to the
# corresponding GitHub Release with auto-generated release notes.
#
# Required repo secrets:
#   PEXELS_API_KEY        - your Pexels API key (read at build time)
#
# Optional (for a signed release APK — without these the workflow ships
# an unsigned release APK, which Play Store will NOT accept but is fine
# for direct-install distribution and testing):
#   SIGNING_KEYSTORE_BASE64  - base64-encoded keystore (.jks) file
#   SIGNING_KEY_ALIAS        - keystore alias
#   SIGNING_KEY_PASSWORD     - key password
#   SIGNING_STORE_PASSWORD   - keystore password
#
# Trigger: push a tag like v1.0.0
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write local.properties
        working-directory: app
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "pexels.api.key=${{ secrets.PEXELS_API_KEY }}"
          } > local.properties

      - name: Decode signing keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > app/app/release.keystore

      - name: Build release APK
        working-directory: app
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/app/build/outputs/apk/release/*.apk
